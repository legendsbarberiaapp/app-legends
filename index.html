<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends Barberia - Tu Corte. Tu Estilo. Tu Trono.</title>

    <!-- App Icons and Manifest -->
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c9a74a",
                        "primary-dark": "#b88a44",
                        "primary-light": "#eecf72",
                        "background-light": "#f8f7f6",
                        "background-dark": "#121212",
                        "matte-black": "#171717",
                        "card-dark": "#1f1f1f",
                        "surface-dark": "#1E1E1E",
                        "surface-card": "#36332b",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2.5s linear infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' }
                        }
                    }
                },
            },
        }
    </script>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Sistema de roles -->
    <script src="role-config.js"></script>
    <script src="role-manager.js"></script>
    <script src="firebase-adapter.js"></script>
    <!-- Componentes reutilizables -->
    <script src="components/toast.js"></script>
    <script src="components/notifications.js"></script>
    <script src="components/nivel-theme.js"></script>
    <!-- Capa de datos (services) -->
    <script src="services/barbers-service.js"></script>
    <script src="services/servicios-service.js"></script>
    <script src="services/adicionales-service.js"></script>
    <script src="services/citas-service.js"></script>
    <script src="services/sedes-service.js"></script>
    <script src="services/productos-service.js"></script>
    <script src="services/ventas-service.js"></script>
    <script src="services/stock-service.js"></script>
    <!-- Loader de pantallas (partials) -->
    <script src="screen-loader.js"></script>
    <!-- Coordinador de UI de administración -->
    <script src="barber-manager.js"></script>
    <!-- Módulos UI del admin (extienden BarberManager.prototype) -->
    <script src="admin/barbers-list-ui.js"></script>
    <script src="admin/barber-modal-ui.js"></script>
    <script src="admin/servicios-picker-ui.js"></script>
    <script src="admin/adicionales-picker-ui.js"></script>
    <script src="admin/sedes-ui.js"></script>
    <script src="admin/productos-ui.js"></script>
    <script src="admin/confirm-dialog-ui.js"></script>
    <!-- UI del admin (usuarios, dashboard, citas) -->
    <script src="admin/usuarios-ui.js"></script>
    <script src="admin/dashboard-ui.js"></script>
    <script src="admin/citas-admin-ui.js"></script>
    <script src="admin/agenda-ui.js"></script>
    <script src="admin/pending-listener.js"></script>
    <!-- Catálogo de servicios (fuente única, leído por booking y services) -->
    <script src="cliente/servicios-catalog.js"></script>
    <!-- UI del cliente (home con servicios+barberos integrados, reserva, perfil) -->
    <script src="cliente/home-ui.js"></script>
    <script src="cliente/booking-ui.js"></script>
    <script src="cliente/profile-ui.js"></script>
    <script src="cliente/cita-listener.js"></script>
    <!-- UI del barbero (citas) -->
    <script src="barbero/citas-ui.js"></script>
    <!-- UI de la recepcionista (F2: opera citas/walkin/reagendar · F3: cobro + caja · F4: inventario) -->
    <script src="recepcionista/citas-ui.js"></script>
    <script src="recepcionista/walkin-ui.js"></script>
    <script src="recepcionista/reagendar-ui.js"></script>
    <script src="recepcionista/cobrar-ui.js"></script>
    <script src="recepcionista/caja-ui.js"></script>
    <script src="recepcionista/inventario-ui.js"></script>
    <!-- Interacciones táctiles/UI globales -->
    <script src="interactions.js"></script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="desktop.css">
</head>

<body class="font-display bg-background-dark text-slate-100 antialiased select-none">

    <!-- SPLASH SCREEN -->
    <div id="splash-screen"
        class="screen active relative flex h-screen w-full flex-col justify-between overflow-hidden">
        <!-- Enhanced Background with radial gradient -->
        <div class="absolute inset-0 bg-gradient-radial from-background-dark via-black to-black z-0"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-black z-0"></div>
        <div class="absolute inset-0 smoke-overlay z-0 animate-pulse-slow"></div>

        <!-- Animated circles in background -->
        <div class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-primary/5 blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/3 right-1/4 w-48 h-48 rounded-full bg-primary/10 blur-2xl animate-pulse-slow">
        </div>

        <!-- Top Safe Area Spacer -->
        <div class="h-16 w-full z-10"></div>

        <!-- Central Brand Content -->
        <div
            class="relative z-10 flex flex-col items-center justify-center flex-grow px-6 animate-[fadeIn_1.2s_ease-out]">
            <!-- Enhanced Logo with better glow effect -->
            <div class="mb-8 relative group">
                <!-- Outer glow ring -->
                <div
                    class="absolute -inset-4 rounded-3xl bg-gradient-to-r from-primary via-primary-light to-primary opacity-20 blur-2xl group-hover:opacity-40 transition-all duration-700 animate-pulse-slow">
                </div>
                <!-- Middle ring -->
                <div class="absolute -inset-2 rounded-3xl bg-primary/30 blur-lg transition-all duration-500">
                </div>
                <!-- Logo container -->
                <div
                    class="relative flex items-center justify-center w-36 h-36 rounded-3xl border-4 border-primary/60 bg-gradient-to-br from-black/80 to-background-dark/80 backdrop-blur-md shadow-2xl group-hover:border-primary transition-all duration-500 group-hover:scale-105 overflow-hidden">
                    <img src="/logo.png" alt="Legends Barberia Logo" class="w-full h-full object-cover rounded-2xl">
                </div>
            </div>

            <!-- Enhanced Brand Name with better hierarchy -->
            <div class="text-center mb-3">
                <h1 class="tracking-wider mb-1">
                    <span
                        class="block text-5xl font-black text-white leading-none tracking-tighter drop-shadow-[0_2px_20px_rgba(201,167,74,0.3)]">LEGENDS</span>
                </h1>
                <span
                    class="block text-xs font-extrabold text-primary/90 tracking-[0.4em] uppercase mt-3 drop-shadow-sm">Barbería
                    Profesional</span>
            </div>

            <!-- Enhanced Divider with animation -->
            <div class="relative w-24 h-[2px] my-7 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
                <div
                    class="absolute inset-0 bg-gradient-to-r from-transparent via-primary to-transparent w-1/2 animate-[shimmer_3s_ease-in-out_infinite]">
                </div>
            </div>

            <!-- Enhanced Tagline -->
            <p class="text-center text-xl italic font-semibold text-gold-gradient animate-shimmer drop-shadow-md">
                Tu corte. Tu estilo. Tu trono.
            </p>

            <!-- Trust indicator -->
            <div
                class="mt-8 flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 backdrop-blur-sm border border-white/10">
                <span class="material-symbols-outlined text-primary text-sm"
                    style="font-variation-settings: 'FILL' 1">verified</span>
                <span class="text-white/70 text-xs font-medium tracking-wide">Barbería Certificada Premium</span>
            </div>
        </div>

        <!-- Enhanced Bottom Action Area -->
        <div class="relative z-10 w-full px-6 pb-10 pt-8 bg-gradient-to-t from-black via-black/95 to-transparent">
            <div class="flex flex-col gap-4 max-w-md mx-auto">

                <!-- ESTADO DE CARGA: Se muestra mientras Firebase verifica la sesión -->
                <div id="auth-loading-state" class="flex flex-col items-center gap-4 py-4">
                    <div class="auth-checking-spinner"></div>
                    <p class="text-white/60 text-sm font-medium animate-pulse">Verificando sesión...</p>
                </div>

                <!-- BOTONES DE LOGIN: Ocultos hasta que Firebase confirme que NO hay sesión -->
                <div id="auth-login-buttons" style="display: none;">
                    <!-- Google Login Button -->
                    <button id="google-login-btn" onclick="handleGoogleLogin()"
                        class="group relative flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-white hover:bg-gray-100 border border-transparent backdrop-blur-sm transition-all duration-300 transform hover:scale-[1.01] active:scale-[0.99] shadow-lg">
                        <div class="relative flex items-center gap-3">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853"></path>
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335"></path>
                            </svg>
                            <span class="text-gray-900 text-base font-bold tracking-wide">Continuar con Google</span>
                        </div>
                    </button>

                    <!-- Terms Link -->
                    <p class="text-center text-xs text-slate-500/80 mt-4 leading-relaxed">
                        Al continuar aceptas nuestros <a
                            class="text-primary/90 hover:text-primary underline underline-offset-2 transition-colors font-medium"
                            href="#">Términos</a> y <a
                            class="text-primary/90 hover:text-primary underline underline-offset-2 transition-colors font-medium"
                            href="#">Política de Privacidad</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="screen hidden">

        <!-- DESKTOP SIDEBAR (visible solo en lg+) -->
        <aside id="desktop-sidebar" class="desktop-sidebar">
            <!-- Brand -->
            <div class="desktop-sidebar-brand">
                <div class="desktop-sidebar-logo">
                    <img src="/logo.png" alt="Legends Barbería" class="w-full h-full object-cover rounded-xl">
                </div>
                <div class="desktop-sidebar-brand-text">
                    <p class="desktop-sidebar-brand-name">LEGENDS</p>
                    <p class="desktop-sidebar-brand-sub">Barbería Profesional</p>
                </div>
            </div>

            <!-- Nav (populated by roleManager.renderNavigation) -->
            <nav class="desktop-sidebar-nav"></nav>

            <!-- User card (populated by roleManager.updateProfileUI) -->
            <div class="desktop-sidebar-user">
                <img id="desktop-sidebar-avatar" src="https://ui-avatars.com/api/?name=Usuario&background=c9a74a&color=000&size=200&bold=true"
                    alt="Avatar" referrerpolicy="no-referrer"
                    class="desktop-sidebar-avatar">
                <div class="desktop-sidebar-user-info">
                    <p id="desktop-sidebar-name" class="desktop-sidebar-user-name">Usuario</p>
                    <p id="desktop-sidebar-role" class="desktop-sidebar-user-role">Cliente</p>
                </div>
                <button onclick="handleSignOut()" aria-label="Cerrar sesión"
                    class="desktop-sidebar-logout" title="Cerrar sesión">
                    <span class="material-symbols-outlined text-lg">logout</span>
                </button>
            </div>
        </aside>

        <!-- CONTENT WRAPPER (aplica padding-left en desktop para el sidebar) -->
        <div class="desktop-content">

        <!-- HOME TAB (partial) — integra servicios y barberos como secciones -->
        <div id="home-tab" class="tab-content active h-[100dvh] w-full flex flex-col relative"
            data-partial="screens/cliente/home.html"></div>

        <!-- BOOKING TAB (partial) -->
        <div id="booking-tab" class="tab-content hidden h-[100dvh] w-full flex flex-col relative"
            data-partial="screens/cliente/booking.html"></div>

        <!-- PROFILE TAB (partial) -->
        <div id="profile-tab" class="tab-content hidden h-screen w-full overflow-y-auto no-scrollbar pb-48"
            data-partial="screens/cliente/profile.html"></div>

        <!-- ============================================
             BARBERO TABS (5 tabs)
             ============================================ -->

        <!-- BARBERO DASHBOARD TAB (partial) -->
        <div id="barbero-dashboard-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/barbero/dashboard.html"></div>

        <!-- BARBERO CITAS TAB (partial) -->
        <div id="barbero-citas-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/barbero/citas.html"></div>

        <!-- ============================================
             RECEPCIONISTA TABS (F1: 1 tab read-only)
             ============================================ -->

        <!-- RECEPCIONISTA CITAS TAB (partial) -->
        <div id="recepcionista-citas-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/recepcionista/citas.html"></div>

        <!-- RECEPCIONISTA CAJA TAB (partial — F3) -->
        <div id="recepcionista-caja-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/recepcionista/caja.html"></div>

        <!-- RECEPCIONISTA INVENTARIO TAB (partial — F4) -->
        <div id="recepcionista-inventario-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/recepcionista/inventario.html"></div>

        <!-- ============================================
             ADMIN TABS (5 tabs)
             ============================================ -->

        <!-- ADMIN DASHBOARD TAB (partial) -->
        <div id="admin-dashboard-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/admin/dashboard.html"></div>

        <!-- ADMIN AGENDA TAB (partial) -->
        <div id="admin-agenda-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/admin/agenda.html"></div>

        <!-- ADMIN USUARIOS TAB (partial) -->
        <div id="admin-usuarios-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/admin/usuarios.html"></div>

        <!-- ADMIN BARBEROS TAB (partial) -->
        <div id="admin-barberos-tab" class="tab-content hidden h-[100dvh] w-full overflow-y-auto bg-background-dark"
            data-partial="screens/admin/barberos.html"></div>

        </div><!-- /.desktop-content -->

        <!-- Enhanced Bottom Navigation Bar - Dynamic Content (solo móvil) -->
        <div id="bottom-nav-shell"
            class="fixed bottom-0 left-0 right-0 z-30 w-full border-t border-white/10 bg-gradient-to-t from-matte-black via-matte-black/95 to-matte-black/90 backdrop-blur-2xl px-4 pb-6 pt-3 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            <div class="bottom-nav-container flex items-center justify-around max-w-md mx-auto gap-2">
                <!-- Contenido generado dinámicamente por roleManager.renderNavigation() -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
