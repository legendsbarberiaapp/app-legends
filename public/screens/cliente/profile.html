<div class="relative pb-32">
    <!-- Glows decorativos -->
    <div class="absolute top-0 left-0 w-full h-[500px] bg-gradient-to-b from-primary/15 via-primary/5 to-transparent pointer-events-none"></div>
    <div class="absolute top-20 left-1/2 -translate-x-1/2 w-64 h-64 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Hero: avatar + nombre + email + tier dinámico -->
    <div class="relative z-10 flex flex-col items-center pt-16 pb-6 px-6">
        <div class="relative group">
            <div class="absolute -inset-3 bg-gradient-to-r from-primary via-primary-light to-primary rounded-full blur-xl opacity-50 group-hover:opacity-80 transition-all duration-700 animate-pulse-slow"></div>
            <div class="absolute -inset-1 bg-gradient-to-r from-primary to-primary-light rounded-full blur-md opacity-60"></div>
            <div class="relative w-32 h-32 p-[4px] rounded-full bg-gradient-to-br from-primary via-primary-light to-primary shadow-[0_0_30px_rgba(201,167,74,0.6)] group-hover:scale-105 transition-transform duration-500">
                <div class="w-full h-full rounded-full bg-background-dark p-[3px]">
                    <img alt="User profile" id="profile-avatar-img"
                        class="w-full h-full rounded-full object-cover ring-2 ring-background-dark"
                        src="https://ui-avatars.com/api/?name=User&background=c9a74a&color=000" />
                </div>
            </div>
            <div class="absolute -bottom-1 -right-1 bg-gradient-to-br from-primary to-primary-light rounded-full p-2 border-4 border-background-dark shadow-lg">
                <span class="material-symbols-outlined text-sm font-bold block text-black" style="font-variation-settings: 'FILL' 1">verified</span>
            </div>
        </div>

        <div class="mt-6 text-center">
            <h2 id="profile-name-display" class="text-[28px] font-black text-white tracking-tight leading-tight mb-1">Cargando...</h2>
            <p id="profile-email-display" class="text-white/50 text-sm font-medium mb-4">Verificando cuenta...</p>

            <!-- Tier badge dinámico (lo llena profile-ui.js con datos reales) -->
            <div id="profile-tier-badge" class="inline-flex items-center px-5 py-2.5 rounded-xl border-2 border-primary/40 bg-gradient-to-r from-primary/20 to-primary/10 backdrop-blur-md shadow-lg">
                <span class="material-symbols-outlined text-primary text-base mr-2" style="font-variation-settings: 'FILL' 1">workspace_premium</span>
                <span class="text-sm font-black text-primary tracking-wider uppercase">Nuevo Miembro</span>
            </div>
        </div>
    </div>

    <!-- Stats reales (visitas, próximas, gasto) -->
    <div class="relative z-10 px-6 mb-8">
        <div id="profile-stats-grid" class="grid grid-cols-3 gap-3">
            <div class="p-4 rounded-2xl bg-gradient-to-br from-surface-dark to-card-dark border border-white/10 text-center">
                <p class="text-white text-2xl font-black tabular-nums" id="stat-visitas">—</p>
                <p class="text-white/40 text-[10px] font-bold uppercase tracking-wider mt-1">Visitas</p>
            </div>
            <div class="p-4 rounded-2xl bg-gradient-to-br from-surface-dark to-card-dark border border-white/10 text-center">
                <p class="text-primary text-2xl font-black tabular-nums" id="stat-proximas">—</p>
                <p class="text-primary/60 text-[10px] font-bold uppercase tracking-wider mt-1">Próximas</p>
            </div>
            <div class="p-4 rounded-2xl bg-gradient-to-br from-surface-dark to-card-dark border border-white/10 text-center">
                <p class="text-white text-2xl font-black tabular-nums" id="stat-gasto">—</p>
                <p class="text-white/40 text-[10px] font-bold uppercase tracking-wider mt-1">Invertido</p>
            </div>
        </div>
    </div>

    <!-- Mis Reservas (contenedor dinámico llenado por profile-ui.js) -->
    <div class="relative z-10 px-6 mb-8">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1">event_note</span>
                <h3 class="text-base font-black text-white uppercase tracking-wide">Mis Reservas</h3>
            </div>
            <button onclick="if(typeof initProfile==='function')initProfile()"
                class="p-2 rounded-lg text-white/40 hover:text-primary transition-colors"
                title="Actualizar">
                <span class="material-symbols-outlined text-sm">refresh</span>
            </button>
        </div>

        <div id="profile-reservas-container">
            <div class="flex flex-col items-center gap-2 py-8">
                <div class="auth-checking-spinner"></div>
                <p class="text-white/40 text-xs">Cargando tus reservas...</p>
            </div>
        </div>
    </div>

    <!-- CTA Reservar + activar notificaciones + Logout -->
    <div class="relative z-10 px-6 space-y-3">
        <button onclick="switchTab('booking')"
            class="w-full flex items-center justify-center gap-2 p-4 rounded-xl bg-gradient-to-r from-primary to-primary-light text-black font-black uppercase tracking-wide text-sm shadow-[0_6px_20px_rgba(201,167,74,0.3)] hover:shadow-[0_8px_25px_rgba(201,167,74,0.5)] transition-all active:scale-[0.98]">
            <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1">calendar_add_on</span>
            <span>Reservar Ahora</span>
        </button>

        <!-- Botón de notificaciones (solo visible si el permiso es 'default') -->
        <button id="profile-enable-notifications" onclick="activarNotificaciones()"
            class="hidden w-full flex items-center justify-center gap-2 p-3.5 rounded-xl bg-white/[0.03] border border-primary/20 text-white/80 hover:bg-primary/10 hover:border-primary/40 transition-all active:scale-[0.98]">
            <span class="material-symbols-outlined text-base text-primary" style="font-variation-settings: 'FILL' 1">notifications_active</span>
            <span class="font-bold text-xs tracking-wide">Activar notificaciones</span>
        </button>

        <button onclick="handleSignOut()"
            class="w-full flex items-center justify-center gap-2 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 hover:bg-red-500/20 hover:border-red-500/40 transition-all active:scale-[0.98]">
            <span class="material-symbols-outlined text-lg">logout</span>
            <span class="font-black uppercase tracking-wide text-sm">Cerrar Sesión</span>
        </button>
    </div>
</div>
