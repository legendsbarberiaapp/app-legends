<div class="flex-1 overflow-y-auto no-scrollbar relative">
    <div class="px-6 pt-8 pb-48">

        <!-- Header -->
        <div class="flex items-center gap-4 mb-8">
            <button onclick="switchTab('home')"
                class="p-3 rounded-2xl border border-white/10 bg-surface-dark/80 backdrop-blur-sm flex items-center justify-center text-white hover:text-primary hover:border-primary/30 transition-all active:scale-95 group">
                <span class="material-symbols-outlined group-hover:-translate-x-0.5 transition-transform">arrow_back</span>
            </button>
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1">event_available</span>
                    <h2 class="text-2xl font-black text-white tracking-tight">Agendar Cita</h2>
                </div>
                <p class="text-white/50 text-xs font-medium">Completa tu reserva en 3 pasos</p>
            </div>
        </div>

        <!-- PASO 1: Servicio -->
        <div class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <div class="flex items-center justify-center w-7 h-7 rounded-full bg-primary/20 border border-primary/40">
                    <span class="text-primary text-xs font-black">1</span>
                </div>
                <h3 class="text-sm font-black text-white uppercase tracking-wider">Selecciona tu Servicio</h3>
            </div>
            <div id="booking-servicios" class="flex gap-3 overflow-x-auto no-scrollbar pb-2 -mx-6 px-6">
                <!-- Botones inyectados por booking-ui.js -->
            </div>
        </div>

        <!-- PASO 2: Barbero -->
        <div class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <div class="flex items-center justify-center w-7 h-7 rounded-full bg-primary/20 border border-primary/40">
                    <span class="text-primary text-xs font-black">2</span>
                </div>
                <h3 class="text-sm font-black text-white uppercase tracking-wider">Elige tu Barbero</h3>
            </div>
            <div id="booking-barberos" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 -mx-6 px-6">
                <!-- Botones inyectados por booking-ui.js -->
            </div>
        </div>

        <!-- PASO 3: Fecha y Hora -->
        <div class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <div class="flex items-center justify-center w-7 h-7 rounded-full bg-primary/20 border border-primary/40">
                    <span class="text-primary text-xs font-black">3</span>
                </div>
                <h3 class="text-sm font-black text-white uppercase tracking-wider">Fecha y Hora</h3>
            </div>
            <div class="bg-gradient-to-br from-surface-card to-card-dark p-6 rounded-2xl border border-white/10 shadow-xl">

                <!-- Selector de fechas (próximos 14 días) -->
                <div id="booking-fechas" class="flex gap-2 overflow-x-auto no-scrollbar pb-3 -mx-2 px-2 mb-6">
                    <!-- Días inyectados por booking-ui.js -->
                </div>

                <h4 class="text-xs font-black text-white/80 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-sm">schedule</span>
                    Horarios Disponibles
                </h4>
                <div id="booking-horarios" class="grid grid-cols-3 gap-3">
                    <!-- Horarios inyectados por booking-ui.js -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer sticky con resumen + botón confirmar -->
<div class="fixed bottom-[85px] left-0 w-full z-40 bg-gradient-to-t from-black via-surface-dark to-surface-dark/95 border-t border-white/10 px-6 py-5 flex flex-col gap-5 rounded-t-3xl backdrop-blur-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">

    <div class="flex items-start justify-between p-4 bg-gradient-to-br from-card-dark/80 to-surface-dark/80 rounded-2xl border border-white/5">
        <div class="flex flex-col gap-1">
            <span class="text-primary/70 text-[10px] font-black uppercase tracking-widest">Total a Pagar</span>
            <span id="booking-total" class="text-white text-3xl font-black tracking-tight">$0</span>
        </div>
        <div class="flex flex-col items-end gap-1">
            <div id="booking-fecha-resumen" class="flex items-center gap-1.5 text-white/60">
                <span class="material-symbols-outlined text-xs">event</span>
                <span class="text-xs font-semibold">— —</span>
            </div>
            <div id="booking-tags-resumen" class="flex items-center gap-1.5 mt-1">
                <!-- tags inyectados por booking-ui.js -->
            </div>
        </div>
    </div>

    <button id="booking-confirm-btn" onclick="confirmarReserva()" disabled
        class="relative group w-full bg-gradient-to-r from-primary via-primary-light to-primary text-black font-black text-base py-5 rounded-2xl shadow-[0_6px_25px_rgba(201,167,74,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-2.5 overflow-hidden disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100">
        <span class="relative z-10 uppercase tracking-wide">Confirmar Reserva</span>
        <span class="relative z-10 material-symbols-outlined font-bold text-xl" style="font-variation-settings: 'FILL' 1">arrow_forward</span>
    </button>
</div>
