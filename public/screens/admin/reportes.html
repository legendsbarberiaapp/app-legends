<div class="px-6 py-8 pb-28 relative">
    <!-- Header -->
    <div class="mb-5">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary/30 to-primary/10 border border-primary/25 flex items-center justify-center shadow-[0_0_20px_rgba(201,167,74,0.15)]">
                <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1">analytics</span>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="text-2xl font-black text-white leading-tight">Reportes</h1>
                <p class="text-white/40 text-xs font-semibold uppercase tracking-wider">Cómo va el negocio</p>
            </div>
            <button onclick="if(typeof reloadReportes==='function')reloadReportes()"
                class="w-10 h-10 rounded-xl bg-white/[0.03] border border-white/[0.06] text-white/50 hover:text-primary hover:border-primary/20 transition-all active:scale-95 flex items-center justify-center"
                title="Recargar">
                <span class="material-symbols-outlined text-lg">refresh</span>
            </button>
        </div>
    </div>

    <!-- Filtros -->
    <div class="mb-5 space-y-3">
        <div>
            <p class="text-white/35 text-[9px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Sede</p>
            <div id="rep-sede-filter" class="flex gap-1.5"></div>
        </div>
        <div>
            <p class="text-white/35 text-[9px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Período</p>
            <div id="rep-periodo-filter" class="flex gap-1.5 overflow-x-auto no-scrollbar"></div>
        </div>
    </div>

    <!-- Contenido principal -->
    <div id="rep-content">
        <div class="flex flex-col items-center gap-3 py-12">
            <div class="auth-checking-spinner"></div>
            <p class="text-white/50 text-xs">Cargando reportes...</p>
        </div>
    </div>
</div>
