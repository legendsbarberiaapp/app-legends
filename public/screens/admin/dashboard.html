<div class="px-6 py-8 pb-28">
    <!-- Header con saludo -->
    <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary/30 to-primary/10 border border-primary/25 flex items-center justify-center shadow-[0_0_20px_rgba(201,167,74,0.15)]">
                    <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1">admin_panel_settings</span>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white leading-tight">Panel de Control</h1>
                    <p class="text-white/40 text-xs font-semibold uppercase tracking-wider">Legends Barbería</p>
                </div>
            </div>
            <button onclick="handleSignOut()" aria-label="Cerrar sesión"
                class="lg:hidden flex items-center gap-1.5 px-3 py-2 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 hover:border-red-500/40 transition-all active:scale-95">
                <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 0">logout</span>
                <span class="text-xs font-bold uppercase tracking-wide">Salir</span>
            </button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 gap-4 mb-10 mt-2" id="dash-stats-grid">
        <!-- Ingresos -->
        <div class="relative overflow-hidden p-5 rounded-2xl bg-gradient-to-br from-emerald-500/10 to-emerald-500/3 border border-emerald-500/15">
            <div class="absolute top-3 right-3 w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-emerald-400 text-xl" style="font-variation-settings: 'FILL' 1">payments</span>
            </div>
            <p class="text-emerald-400/60 text-[10px] font-black uppercase tracking-widest mb-2">Ingresos</p>
            <p class="text-white text-2xl font-black" id="dash-ingresos">$0</p>
            <p class="text-white/25 text-[10px] font-bold mt-1">Este mes</p>
        </div>

        <!-- Citas Hoy -->
        <div class="relative overflow-hidden p-5 rounded-2xl bg-gradient-to-br from-blue-500/10 to-blue-500/3 border border-blue-500/15">
            <div class="absolute top-3 right-3 w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-blue-400 text-xl" style="font-variation-settings: 'FILL' 1">event_available</span>
            </div>
            <p class="text-blue-400/60 text-[10px] font-black uppercase tracking-widest mb-2">Citas Hoy</p>
            <p class="text-white text-2xl font-black" id="dash-citas">0</p>
            <p class="text-white/25 text-[10px] font-bold mt-1">Programadas</p>
        </div>

        <!-- Usuarios -->
        <div class="relative overflow-hidden p-5 rounded-2xl bg-gradient-to-br from-violet-500/10 to-violet-500/3 border border-violet-500/15">
            <div class="absolute top-3 right-3 w-10 h-10 rounded-xl bg-violet-500/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-violet-400 text-xl" style="font-variation-settings: 'FILL' 1">group</span>
            </div>
            <p class="text-violet-400/60 text-[10px] font-black uppercase tracking-widest mb-2">Usuarios</p>
            <p class="text-white text-2xl font-black" id="dash-usuarios">0</p>
            <p class="text-white/25 text-[10px] font-bold mt-1">Registrados</p>
        </div>

        <!-- Barberos -->
        <div class="relative overflow-hidden p-5 rounded-2xl bg-gradient-to-br from-primary/10 to-primary/3 border border-primary/15">
            <div class="absolute top-3 right-3 w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1">content_cut</span>
            </div>
            <p class="text-primary/60 text-[10px] font-black uppercase tracking-widest mb-2">Barberos</p>
            <p class="text-white text-2xl font-black" id="dash-barberos">0</p>
            <p class="text-white/25 text-[10px] font-bold mt-1">Activos</p>
        </div>
    </div>

    <!-- Accesos Rápidos -->
    <div class="mb-10">
        <h2 class="text-white/40 text-[10px] font-black uppercase tracking-widest mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1">bolt</span>
            Accesos Rápidos
        </h2>
        <div class="grid grid-cols-3 gap-3">
            <button onclick="switchTab('admin-barberos'); setTimeout(()=>barberManager.openAddBarberModal(), 300)"
                class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white/[0.03] border border-white/[0.06] hover:border-primary/20 hover:bg-primary/5 transition-all active:scale-95">
                <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1">person_add</span>
                </div>
                <span class="text-white/50 text-[10px] font-bold text-center leading-tight">Agregar<br>Barbero</span>
            </button>
            <button onclick="switchTab('admin-usuarios')"
                class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white/[0.03] border border-white/[0.06] hover:border-blue-500/20 hover:bg-blue-500/5 transition-all active:scale-95">
                <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-blue-400 text-lg" style="font-variation-settings: 'FILL' 1">manage_accounts</span>
                </div>
                <span class="text-white/50 text-[10px] font-bold text-center leading-tight">Gestionar<br>Usuarios</span>
            </button>
            <button onclick="switchTab('admin-barberos')"
                class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white/[0.03] border border-white/[0.06] hover:border-violet-500/20 hover:bg-violet-500/5 transition-all active:scale-95">
                <div class="w-10 h-10 rounded-xl bg-violet-500/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-violet-400 text-lg" style="font-variation-settings: 'FILL' 1">groups</span>
                </div>
                <span class="text-white/50 text-[10px] font-bold text-center leading-tight">Ver<br>Equipo</span>
            </button>
        </div>
    </div>

    <!-- Citas Pendientes de Confirmar -->
    <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-white/40 text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1">pending_actions</span>
                Citas Pendientes
                <span id="admin-citas-pendientes-count"
                    class="ml-1 hidden items-center justify-center min-w-[22px] h-5 px-1.5 rounded-full bg-red-500 text-white text-[10px] font-black shadow-[0_0_10px_rgba(239,68,68,0.6)] animate-pulse">0</span>
            </h2>
            <button onclick="if(typeof initCitasPendientes==='function')initCitasPendientes()"
                class="p-2 rounded-lg bg-white/[0.03] border border-white/[0.06] text-white/40 hover:text-primary hover:border-primary/20 transition-all active:scale-95"
                title="Actualizar">
                <span class="material-symbols-outlined text-sm">refresh</span>
            </button>
        </div>
        <div id="admin-citas-pendientes-container" class="space-y-2">
            <div class="flex flex-col items-center gap-3 py-8">
                <div class="auth-checking-spinner"></div>
                <p class="text-white/50 text-xs">Cargando citas pendientes...</p>
            </div>
        </div>
    </div>
</div>
