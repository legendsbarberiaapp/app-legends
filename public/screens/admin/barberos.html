<div class="px-6 py-8 pb-28">
    <!-- Header con botón agregar -->
    <div class="mb-8">
        <div class="flex items-center justify-between mb-2">
            <div>
                <h1 class="text-3xl font-black text-white mb-1">Gestión de Barberos</h1>
                <p class="text-white/60 text-sm">Administra tu equipo</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="barberManager.openGestionarSedes()"
                    title="Gestionar sedes"
                    class="p-3 rounded-xl bg-white/5 border border-white/10 hover:border-primary/30 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">storefront</span>
                </button>
                <button onclick="barberManager.loadBarbers()"
                    title="Recargar"
                    class="p-3 rounded-xl bg-white/5 border border-white/10 hover:border-primary/30 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-primary">refresh</span>
                </button>
            </div>
        </div>

        <!-- Botón Agregar Nuevo Barbero -->
        <button onclick="barberManager.openAddBarberModal()"
            class="w-full mt-4 flex items-center justify-center gap-3 px-5 py-4 rounded-2xl bg-gradient-to-r from-primary to-primary-light text-black font-black text-sm uppercase tracking-wider shadow-[0_4px_20px_rgba(201,167,74,0.3)] hover:shadow-[0_4px_30px_rgba(201,167,74,0.5)] transition-all active:scale-[0.97] border border-primary-light/30">
            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">person_add</span>
            Agregar Nuevo Barbero
        </button>
    </div>

    <!-- Contenedor dinámico de barberos – se llena desde Firestore -->
    <div id="admin-barbers-list" class="space-y-3">
        <div class="barber-empty-state">
            <div class="barber-empty-icon">
                <span class="material-symbols-outlined text-primary/30 text-6xl">content_cut</span>
            </div>
            <p class="text-white/50 text-base font-bold mt-4">Sin barberos registrados</p>
            <p class="text-white/30 text-xs mt-1">Agrega tu primer barbero con el botón de arriba</p>
        </div>
    </div>
</div>
