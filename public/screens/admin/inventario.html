<div class="px-6 py-8 pb-28 relative">
    <!-- Header -->
    <div class="mb-5">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary/30 to-primary/10 border border-primary/25 flex items-center justify-center shadow-[0_0_20px_rgba(201,167,74,0.15)]">
                <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1">inventory_2</span>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="text-2xl font-black text-white leading-tight">Inventario</h1>
                <p class="text-white/40 text-xs font-semibold uppercase tracking-wider">Stock por sede + alertas</p>
            </div>
            <button onclick="if(typeof reloadInventarioAdmin==='function')reloadInventarioAdmin()"
                class="w-10 h-10 rounded-xl bg-white/[0.03] border border-white/[0.06] text-white/50 hover:text-primary hover:border-primary/20 transition-all active:scale-95 flex items-center justify-center"
                title="Recargar">
                <span class="material-symbols-outlined text-lg">refresh</span>
            </button>
        </div>
    </div>

    <!-- Botón agregar -->
    <button onclick="if(typeof openAgregarProductoModal==='function')openAgregarProductoModal()"
        class="w-full mb-5 flex items-center justify-center gap-3 px-5 py-4 rounded-2xl bg-gradient-to-r from-primary to-primary-light text-black font-black text-sm uppercase tracking-wider shadow-[0_4px_20px_rgba(201,167,74,0.3)] hover:shadow-[0_4px_30px_rgba(201,167,74,0.5)] transition-all active:scale-[0.97] border border-primary-light/30">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">add_box</span>
        Agregar Producto
    </button>

    <!-- Filtro sede -->
    <div class="mb-5">
        <p class="text-white/35 text-[9px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Sede</p>
        <div id="inv-admin-sede-filter" class="flex gap-1.5 flex-wrap"></div>
    </div>

    <!-- Alertas resumen -->
    <div id="inv-admin-alertas" class="mb-5"></div>

    <!-- Lista de productos -->
    <div id="inv-admin-list">
        <div class="flex flex-col items-center gap-3 py-12">
            <div class="auth-checking-spinner"></div>
            <p class="text-white/50 text-xs">Cargando inventario...</p>
        </div>
    </div>
</div>
