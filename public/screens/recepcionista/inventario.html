<div class="px-6 py-8 pb-28 relative">
    <!-- Header -->
    <div class="mb-5">
        <div class="flex items-center gap-3 mb-1">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary/30 to-primary/10 border border-primary/25 flex items-center justify-center shadow-[0_0_20px_rgba(201,167,74,0.15)]">
                <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1">inventory_2</span>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="text-2xl font-black text-white leading-tight">Inventario</h1>
                <p id="inv-sub-label" class="text-white/40 text-xs font-semibold uppercase tracking-wider truncate">Cargando...</p>
            </div>
            <button onclick="if(typeof reloadRecepcionistaInventario==='function')reloadRecepcionistaInventario()"
                class="w-10 h-10 rounded-xl bg-white/[0.03] border border-white/[0.06] text-white/50 hover:text-primary hover:border-primary/20 transition-all active:scale-95 flex items-center justify-center"
                title="Recargar">
                <span class="material-symbols-outlined text-lg">refresh</span>
            </button>
        </div>
    </div>

    <!-- Selector de sede (solo admin; vacío para la recepcionista) -->
    <div id="inv-admin-sede" class="mb-5"></div>

    <!-- Alertas de bajo stock -->
    <div id="inv-alertas" class="mb-5"></div>

    <!-- Lista de productos -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Productos</p>
        <div id="inv-productos-list" class="space-y-2">
            <div class="flex flex-col items-center gap-3 py-12">
                <div class="auth-checking-spinner"></div>
                <p class="text-white/50 text-xs">Cargando inventario...</p>
            </div>
        </div>
    </div>

    <!-- Movimientos recientes -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Movimientos recientes</p>
        <div id="inv-movimientos-list" class="space-y-2"></div>
    </div>

    <!-- FAB Registrar entrada -->
    <button onclick="if(typeof openEntradaModal==='function')openEntradaModal()"
        aria-label="Registrar entrada de mercancía"
        class="fixed bottom-24 right-6 z-20 flex items-center gap-2 px-5 py-3.5 rounded-full bg-gradient-to-br from-primary via-primary-light to-primary text-matte-black font-black text-sm uppercase tracking-wider shadow-[0_10px_40px_rgba(201,167,74,0.45)] hover:shadow-[0_15px_50px_rgba(201,167,74,0.65)] transition-all duration-300 transform hover:-translate-y-1 hover:scale-105 active:scale-95">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">add_box</span>
        Entrada
    </button>
</div>
