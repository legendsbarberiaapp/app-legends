<div class="px-6 py-8 pb-28 relative">
    <!-- Header -->
    <div class="mb-5">
        <div class="flex items-center gap-3 mb-1">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary/30 to-primary/10 border border-primary/25 flex items-center justify-center shadow-[0_0_20px_rgba(201,167,74,0.15)]">
                <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1">point_of_sale</span>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="text-2xl font-black text-white leading-tight">Caja</h1>
                <p id="caja-sub-label" class="text-white/40 text-xs font-semibold uppercase tracking-wider truncate">Cargando...</p>
            </div>
            <button onclick="if(typeof reloadRecepcionistaCaja==='function')reloadRecepcionistaCaja()"
                class="w-10 h-10 rounded-xl bg-white/[0.03] border border-white/[0.06] text-white/50 hover:text-primary hover:border-primary/20 transition-all active:scale-95 flex items-center justify-center"
                title="Recargar">
                <span class="material-symbols-outlined text-lg">refresh</span>
            </button>
        </div>
    </div>

    <!-- Selector de sede (solo admin) -->
    <div id="caja-admin-sede" class="mb-5"></div>

    <!-- Cuentas del día: totales por método -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Cuentas del día</p>
        <div id="caja-totales" class="grid grid-cols-3 gap-2 mb-3"></div>
        <div id="caja-total-bar" class="p-3.5 rounded-2xl bg-gradient-to-br from-primary/15 to-primary/5 border border-primary/25 flex items-center justify-between">
            <span class="text-white/65 text-xs font-black uppercase tracking-wider">Total vendido</span>
            <span id="caja-total-amount" class="text-primary text-2xl font-black tabular-nums">$0</span>
        </div>
    </div>

    <!-- Cuadre de efectivo: lo que debería haber en caja -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Efectivo en caja</p>
        <div id="caja-cuadre" class="p-4 rounded-2xl bg-white/[0.03] border border-white/[0.06] space-y-2"></div>
        <div class="mt-3 grid grid-cols-2 gap-2">
            <button onclick="if(typeof openRetiroModal==='function')openRetiroModal()"
                class="flex items-center justify-center gap-2 px-3 py-3 rounded-xl bg-red-500/10 border border-red-500/25 text-red-300 text-xs font-black uppercase tracking-wider hover:bg-red-500/20 transition-all active:scale-[0.98]">
                <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1">account_balance_wallet</span>
                Retiro
            </button>
            <button onclick="if(typeof openGastoModal==='function')openGastoModal()"
                class="flex items-center justify-center gap-2 px-3 py-3 rounded-xl bg-orange-500/10 border border-orange-500/25 text-orange-300 text-xs font-black uppercase tracking-wider hover:bg-orange-500/20 transition-all active:scale-[0.98]">
                <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1">receipt_long</span>
                Gasto
            </button>
        </div>
    </div>

    <!-- Gastos de hoy -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Gastos de hoy</p>
        <div id="caja-gastos-list" class="space-y-2"></div>
    </div>

    <!-- Deudores (deudas pendientes por cliente) -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Deudores</p>
        <div id="caja-deudores" class="space-y-2"></div>
    </div>

    <!-- Desglose por barbero -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Por barbero</p>
        <div id="caja-barberos" class="space-y-2"></div>
    </div>

    <!-- Retiros de hoy -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Retiros de hoy</p>
        <div id="caja-retiros-list" class="space-y-2"></div>
    </div>

    <!-- Historial de ventas -->
    <div class="mb-5">
        <p class="text-white/45 text-[10px] font-black uppercase tracking-[0.3em] mb-2 pl-1">Ventas de hoy</p>
        <div id="caja-ventas-list" class="space-y-2">
            <div class="flex flex-col items-center gap-3 py-12">
                <div class="auth-checking-spinner"></div>
                <p class="text-white/50 text-xs">Cargando...</p>
            </div>
        </div>
    </div>

    <!-- FAB nueva venta (corte y/o producto) -->
    <button onclick="if(typeof openVentaDirecta==='function')openVentaDirecta()"
        aria-label="Nueva venta (corte o producto)"
        class="fixed bottom-24 right-6 z-20 flex items-center gap-2 px-5 py-3.5 rounded-full bg-gradient-to-br from-primary via-primary-light to-primary text-matte-black font-black text-sm uppercase tracking-wider shadow-[0_10px_40px_rgba(201,167,74,0.45)] hover:shadow-[0_15px_50px_rgba(201,167,74,0.65)] transition-all duration-300 transform hover:-translate-y-1 hover:scale-105 active:scale-95">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">point_of_sale</span>
        Nueva venta
    </button>
</div>
