<div class="px-6 py-8 pb-28 relative">
    <!-- Header -->
    <div class="mb-5">
        <div class="flex items-center gap-3 mb-1">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-green-500/30 to-green-500/10 border border-green-500/25 flex items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.15)]">
                <span class="material-symbols-outlined text-green-400 text-2xl" style="font-variation-settings: 'FILL' 1">event_available</span>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="text-2xl font-black text-white leading-tight">Citas</h1>
                <p id="recep-sede-label" class="text-white/40 text-xs font-semibold uppercase tracking-wider truncate">Cargando...</p>
            </div>
            <button onclick="if(typeof reloadRecepcionistaCitas==='function')reloadRecepcionistaCitas()"
                class="w-10 h-10 rounded-xl bg-white/[0.03] border border-white/[0.06] text-white/50 hover:text-primary hover:border-primary/20 transition-all active:scale-95 flex items-center justify-center"
                title="Recargar">
                <span class="material-symbols-outlined text-lg">refresh</span>
            </button>
        </div>
    </div>

    <!-- Navegador de día -->
    <div class="mb-5 p-4 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
        <div class="flex items-center gap-3">
            <button id="recep-prev-btn" onclick="if(typeof recepGoPrev==='function')recepGoPrev()"
                class="w-10 h-10 rounded-xl bg-white/[0.04] border border-white/[0.08] text-white/60 hover:bg-primary/10 hover:text-primary hover:border-primary/25 transition-all active:scale-95 flex items-center justify-center">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <div class="flex-1 text-center">
                <p id="recep-date-label" class="text-white text-sm font-black leading-tight">—</p>
                <p id="recep-date-sub" class="text-white/40 text-[10px] font-bold uppercase tracking-widest mt-0.5">Cargando</p>
            </div>
            <button id="recep-next-btn" onclick="if(typeof recepGoNext==='function')recepGoNext()"
                class="w-10 h-10 rounded-xl bg-white/[0.04] border border-white/[0.08] text-white/60 hover:bg-primary/10 hover:text-primary hover:border-primary/25 transition-all active:scale-95 flex items-center justify-center">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>
        <button id="recep-today-btn" onclick="if(typeof recepGoToday==='function')recepGoToday()"
            class="mt-3 w-full py-2 rounded-lg bg-primary/10 border border-primary/25 text-primary text-[10px] font-black uppercase tracking-widest hover:bg-primary/20 transition-all active:scale-95 hidden">
            Volver a hoy
        </button>
    </div>

    <!-- Contenido dinámico -->
    <div id="recep-citas-content" class="space-y-3">
        <div class="flex flex-col items-center gap-3 py-12">
            <div class="auth-checking-spinner"></div>
            <p class="text-white/50 text-xs">Cargando citas...</p>
        </div>
    </div>

    <!-- FAB walk-in -->
    <button onclick="if(typeof openWalkinModal==='function')openWalkinModal()"
        aria-label="Registrar walk-in"
        class="fixed bottom-24 right-6 z-20 flex items-center gap-2 px-5 py-3.5 rounded-full bg-gradient-to-br from-primary via-primary-light to-primary text-matte-black font-black text-sm uppercase tracking-wider shadow-[0_10px_40px_rgba(201,167,74,0.45)] hover:shadow-[0_15px_50px_rgba(201,167,74,0.65)] transition-all duration-300 transform hover:-translate-y-1 hover:scale-105 active:scale-95">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">person_add</span>
        Walk-in
    </button>
</div>
